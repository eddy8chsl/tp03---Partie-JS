<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulaire</title>
    <script src="js/validation.js" defer></script>
    <script src="https://cdn.jsdelivr.net/npm/apexcharts"></script>
</head>
<body>  
    <section id="simulator">
        <h2>Simulateur d’investissement</h2>

        <form id="simulator-form">
        
            <div>
                <label for="capital">Capital initial (€)</label>
                <input type="number" id="capital" name="capital">
            </div>

            <div>
                <label for="rate">Rendement annuel (%)</label>
                <input type="number" id="rate" name="rate" step="0.1" >
            </div>

            <div>
                <label for="monthly">Versement mensuel (€)</label>
                <input type="number" id="monthly" name="monthly">
            </div>

            <div>
                <label for="years">Nombre d’années</label>
                <input type="number" id="years" name="years">
            </div>

            <button id type="submit" aria-label="Lancer le calcul de la simulation d’investissement">
                Submit
            </button>

        </form>

        <br><div id="result">
            <!-- Résultat affiché ici -->
        </div>

        <div>
            <div id="simulatorChart">
                <!-- Graphique affiché ici -->
            </div>
        </div>
    </section>
</body>

</html>
